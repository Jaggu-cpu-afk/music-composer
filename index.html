<!DOCTYPE html>
<html>
<head>
  <title>Mood Music Player</title>

  <!-- Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎧 Mood Music Player</h1>

  <!-- IMPORTANT: correct path -->
  <img id="albumArt" src="images/neutral.jpg">

  <h3 id="songTitle">Now Playing: Neutral Vibes 🎧</h3>

  <div class="equalizer">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="music-notes">
    <span>🎵</span>
    <span>🎶</span>
    <span>🎵</span>
    <span>🎶</span>
  </div>

  <div id="chatbox"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="How are you feeling...">
    <button onclick="sendMessage()">➤</button>
  </div>

  <!-- preload helps GitHub audio -->
  <audio id="audioPlayer" controls preload="auto"></audio>

  <button id="favBtn" onclick="addFavorite()">❤️ Add to Favorites</button>

</div>

<script src="script.js"></script>
</body>
</html>
