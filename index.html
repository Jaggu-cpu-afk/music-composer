<!DOCTYPE html>
<html>
<head>
  <title>Mood Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎧 Mood Music Player</h1>

  <!-- Image -->
  <img id="albumArt" src="neutral.jpg">

  <!-- Song title -->
  <h3 id="songTitle">Now Playing: Neutral Vibes</h3>

  <!-- Equalizer -->
  <div class="equalizer">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Chat -->
  <div id="chatbox"></div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="userInput" placeholder="How are you feeling...">
    <button onclick="sendMessage()">➤</button>
  </div>

  <!-- Audio -->
  <audio id="audioPlayer" controls preload="auto"></audio>

  <!-- Favorite -->
  <button id="favBtn" onclick="addFavorite()">❤️ Add to Favorites</button>

</div>

<script src="script.js"></script>
</body>
</html>
